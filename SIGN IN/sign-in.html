<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Sign In | VELVET HERITAGE </title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta charset="UTF-8">
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="http://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>
    <body>

        <div class="logo-box">
    <header>
        <button hidden id="themeToggle">
            <i class="fa-solid fa-moon"></i>
        </button>
        <img class="logo" src="images/LOGO.奡༲렘䭪뤹̀蠀킐༩翹" width="100px" alt="">
        <h1> VELVET HERITAGE</h1>
    </header> 
    </div>
        <main>
            <div class="left">
                    <h1 class="title">Sign In</h1>

            <section class="form-section">
                <form onsubmit="signIn(event)">
                    <div class="form-container">

                        <div>
                            <label>USER NAME :</label>
                            <input id="userName" type="text" placeholder="your user name...">
                        </div>

                        <div>
                            <label>PASSWORD :</label>
                            <input id="password" type="password" placeholder="your password...">
                        </div>

                    </div>

                    <button type="submit">Sign In</button>
                    <p id="msg"></p>

                </form>
            </section>
            
            </div>

            <div>
                <img class="image" src="images/image.jpeg" alt="not found">
                <div class="container">
                <div class="overlay">
                    <p>Don't have an account ?</p>
                    <a href="create.html">Create Account</a>
            </div>
        </div>
            
        </main>

        <footer>
            <div class="cpy">
                &copy; 2026 Velvet Heritage Magazine. All Rights Reserved.
            </div>
            <div class="cookies">
            <nav>
                <ul class="foot">
                <li><a href="#"> Privacy Policy</a></li>
                <li><a href="#">Terms of Service</a></li>
                <li><a href="#">Cookies</a></li>
                </ul>
            </nav>
            </div>
        </footer>
        
    </body>
    <script src="theme.js"></script>
    <script src="signin.js"></script>

</html>
